<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#222;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#222;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <clipPath id="browserClip">
      <rect x="20" y="20" width="1160" height="660" rx="8"/>
    </clipPath>
  </defs>

  <!-- Browser Frame -->
  <rect x="20" y="20" width="1160" height="660" rx="8" fill="#fff" filter="url(#shadow1)"/>

  <!-- Browser Chrome -->
  <rect x="20" y="20" width="1160" height="40" rx="8" fill="#2D2D2D"/>
  <rect x="20" y="48" width="1160" height="12" fill="#2D2D2D"/>

  <!-- Traffic Lights -->
  <circle cx="48" cy="40" r="6" fill="#FF5F56"/>
  <circle cx="68" cy="40" r="6" fill="#FFBD2E"/>
  <circle cx="88" cy="40" r="6" fill="#27C93F"/>

  <!-- URL Bar -->
  <rect x="200" y="30" width="600" height="20" rx="4" fill="#1A1A1A"/>
  <text x="310" y="44" font-family="sans-serif" font-size="11" fill="#999">luxe-fashion.myshopify.com</text>

  <!-- Page Content Area -->
  <rect x="20" y="60" width="1160" height="620" fill="#FFFFFF"/>

  <!-- Nav Bar -->
  <rect x="20" y="60" width="1160" height="50" fill="#FFFFFF"/>
  <line x1="20" y1="110" x2="1180" y2="110" stroke="#E5E5E5" stroke-width="1"/>
  <text x="80" y="90" font-family="sans-serif" font-size="16" font-weight="700" fill="#222">LUXE FASHION</text>
  <text x="460" y="90" font-family="sans-serif" font-size="13" fill="#555">Home</text>
  <text x="530" y="90" font-family="sans-serif" font-size="13" fill="#555">Shop</text>
  <text x="595" y="90" font-family="sans-serif" font-size="13" fill="#555">About</text>
  <text x="665" y="90" font-family="sans-serif" font-size="13" fill="#555">Contact</text>
  <!-- Cart Icon -->
  <rect x="1110" y="78" width="18" height="16" rx="2" fill="none" stroke="#555" stroke-width="1.5"/>
  <line x1="1115" y1="78" x2="1115" y2="74" stroke="#555" stroke-width="1.5"/>
  <line x1="1123" y1="78" x2="1123" y2="74" stroke="#555" stroke-width="1.5"/>

  <!-- Hero Banner -->
  <rect x="20" y="110" width="1160" height="320" fill="#F5F5F5"/>
  <rect x="20" y="110" width="1160" height="320" fill="url(#heroGrad)"/>
  <text x="100" y="230" font-family="sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)" letter-spacing="3">SPRING / SUMMER</text>
  <text x="100" y="280" font-family="sans-serif" font-size="42" font-weight="700" fill="#FFFFFF">New Collection 2026</text>
  <text x="100" y="310" font-family="sans-serif" font-size="15" fill="rgba(255,255,255,0.8)">Discover the latest trends in premium fashion</text>
  <rect x="100" y="330" width="140" height="42" rx="4" fill="#FFFFFF"/>
  <text x="133" y="356" font-family="sans-serif" font-size="14" font-weight="600" fill="#222">Shop Now</text>

  <!-- Product Cards Row -->
  <text x="80" y="470" font-family="sans-serif" font-size="20" font-weight="600" fill="#222">Trending Now</text>

  <!-- Card 1 -->
  <rect x="80" y="490" width="240" height="170" rx="6" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="80" y="490" width="240" height="120" rx="6" fill="#EBEBEB"/>
  <rect x="80" y="604" width="240" height="6" rx="0" fill="#F5F5F5"/>
  <text x="90" y="630" font-family="sans-serif" font-size="12" fill="#222">Classic Blazer</text>
  <text x="90" y="650" font-family="sans-serif" font-size="12" fill="#888">$149</text>

  <!-- Card 2 -->
  <rect x="350" y="490" width="240" height="170" rx="6" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="350" y="490" width="240" height="120" rx="6" fill="#EBEBEB"/>
  <text x="360" y="630" font-family="sans-serif" font-size="12" fill="#222">Silk Dress</text>
  <text x="360" y="650" font-family="sans-serif" font-size="12" fill="#888">$219</text>

  <!-- Card 3 -->
  <rect x="620" y="490" width="240" height="170" rx="6" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="620" y="490" width="240" height="120" rx="6" fill="#EBEBEB"/>
  <text x="630" y="630" font-family="sans-serif" font-size="12" fill="#222">Oxford Shirt</text>
  <text x="630" y="650" font-family="sans-serif" font-size="12" fill="#888">$89</text>

  <!-- Card 4 -->
  <rect x="890" y="490" width="240" height="170" rx="6" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="890" y="490" width="240" height="120" rx="6" fill="#EBEBEB"/>
  <text x="900" y="630" font-family="sans-serif" font-size="12" fill="#222">Leather Bag</text>
  <text x="900" y="650" font-family="sans-serif" font-size="12" fill="#888">$329</text>
</svg>