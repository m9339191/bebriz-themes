<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <filter id="colShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Browser Frame -->
  <rect x="16" y="16" width="768" height="468" rx="8" fill="#fff" filter="url(#colShadow)"/>

  <!-- Browser Chrome -->
  <rect x="16" y="16" width="768" height="36" rx="8" fill="#2D2D2D"/>
  <rect x="16" y="40" width="768" height="12" fill="#2D2D2D"/>
  <circle cx="40" cy="34" r="5" fill="#FF5F56"/>
  <circle cx="56" cy="34" r="5" fill="#FFBD2E"/>
  <circle cx="72" cy="34" r="5" fill="#27C93F"/>
  <rect x="180" y="25" width="400" height="18" rx="4" fill="#1A1A1A"/>
  <text x="270" y="38" font-family="sans-serif" font-size="10" fill="#999">luxe-fashion.myshopify.com/collections/all</text>

  <!-- Page Content -->
  <rect x="16" y="52" width="768" height="432" fill="#FFFFFF"/>

  <!-- Nav -->
  <rect x="16" y="52" width="768" height="40" fill="#FFFFFF"/>
  <line x1="16" y1="92" x2="784" y2="92" stroke="#E5E5E5" stroke-width="1"/>
  <text x="50" y="77" font-family="sans-serif" font-size="14" font-weight="700" fill="#222">LUXE FASHION</text>

  <!-- Page Title -->
  <text x="300" y="120" font-family="sans-serif" font-size="18" font-weight="700" fill="#222" text-anchor="middle">All Products</text>

  <!-- Sidebar Filters -->
  <rect x="30" y="140" width="160" height="330" fill="#FAFAFA" rx="6"/>
  <text x="45" y="165" font-family="sans-serif" font-size="12" font-weight="700" fill="#222">Filters</text>

  <!-- Color filter -->
  <text x="45" y="190" font-family="sans-serif" font-size="11" font-weight="600" fill="#222">Color</text>
  <rect x="45" y="200" width="12" height="12" rx="2" fill="none" stroke="#CCC" stroke-width="1.5"/>
  <text x="63" y="211" font-family="sans-serif" font-size="10" fill="#555">Black</text>
  <rect x="45" y="220" width="12" height="12" rx="2" fill="#222" stroke="#222" stroke-width="1.5"/>
  <text x="63" y="231" font-family="sans-serif" font-size="10" fill="#555">Navy</text>
  <rect x="45" y="240" width="12" height="12" rx="2" fill="none" stroke="#CCC" stroke-width="1.5"/>
  <text x="63" y="251" font-family="sans-serif" font-size="10" fill="#555">White</text>
  <rect x="45" y="260" width="12" height="12" rx="2" fill="none" stroke="#CCC" stroke-width="1.5"/>
  <text x="63" y="271" font-family="sans-serif" font-size="10" fill="#555">Red</text>

  <!-- Size filter -->
  <text x="45" y="300" font-family="sans-serif" font-size="11" font-weight="600" fill="#222">Size</text>
  <rect x="45" y="310" width="12" height="12" rx="2" fill="none" stroke="#CCC" stroke-width="1.5"/>
  <text x="63" y="321" font-family="sans-serif" font-size="10" fill="#555">S</text>
  <rect x="95" y="310" width="12" height="12" rx="2" fill="none" stroke="#CCC" stroke-width="1.5"/>
  <text x="113" y="321" font-family="sans-serif" font-size="10" fill="#555">M</text>
  <rect x="45" y="330" width="12" height="12" rx="2" fill="#222" stroke="#222" stroke-width="1.5"/>
  <text x="63" y="341" font-family="sans-serif" font-size="10" fill="#555">L</text>
  <rect x="95" y="330" width="12" height="12" rx="2" fill="none" stroke="#CCC" stroke-width="1.5"/>
  <text x="113" y="341" font-family="sans-serif" font-size="10" fill="#555">XL</text>

  <!-- Price Range -->
  <text x="45" y="370" font-family="sans-serif" font-size="11" font-weight="600" fill="#222">Price</text>
  <line x1="45" y1="385" x2="170" y2="385" stroke="#E5E5E5" stroke-width="3" stroke-linecap="round"/>
  <line x1="65" y1="385" x2="140" y2="385" stroke="#222" stroke-width="3" stroke-linecap="round"/>
  <circle cx="65" cy="385" r="6" fill="#FFF" stroke="#222" stroke-width="2"/>
  <circle cx="140" cy="385" r="6" fill="#FFF" stroke="#222" stroke-width="2"/>
  <text x="45" y="405" font-family="sans-serif" font-size="9" fill="#888">$25 - $350</text>

  <!-- Toolbar -->
  <rect x="210" y="140" width="560" height="30" fill="#FAFAFA" rx="4"/>
  <text x="225" y="159" font-family="sans-serif" font-size="10" fill="#888">18 products</text>
  <!-- Grid/List toggle -->
  <rect x="680" y="147" width="14" height="14" rx="2" fill="none" stroke="#222" stroke-width="1.5"/>
  <rect x="700" y="147" width="14" height="14" rx="2" fill="none" stroke="#CCC" stroke-width="1.5"/>
  <!-- Sort -->
  <rect x="725" y="146" width="35" height="16" rx="3" fill="#FFF" stroke="#E5E5E5" stroke-width="1"/>
  <text x="730" y="157" font-family="sans-serif" font-size="8" fill="#888">Sort</text>

  <!-- Product Grid 3x2 -->
  <!-- Row 1 -->
  <rect x="210" y="182" width="170" height="130" rx="6" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="210" y="182" width="170" height="85" rx="6" fill="#EBEBEB"/>
  <text x="218" y="285" font-family="sans-serif" font-size="10" fill="#222">Classic Blazer</text>
  <text x="218" y="300" font-family="sans-serif" font-size="10" fill="#888">$149</text>

  <rect x="395" y="182" width="170" height="130" rx="6" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="395" y="182" width="170" height="85" rx="6" fill="#EBEBEB"/>
  <text x="403" y="285" font-family="sans-serif" font-size="10" fill="#222">Silk Midi Dress</text>
  <text x="403" y="300" font-family="sans-serif" font-size="10" fill="#888">$219</text>

  <rect x="580" y="182" width="170" height="130" rx="6" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="580" y="182" width="170" height="85" rx="6" fill="#EBEBEB"/>
  <text x="588" y="285" font-family="sans-serif" font-size="10" fill="#222">Oxford Shirt</text>
  <text x="588" y="300" font-family="sans-serif" font-size="10" fill="#888">$89</text>

  <!-- Row 2 -->
  <rect x="210" y="325" width="170" height="130" rx="6" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="210" y="325" width="170" height="85" rx="6" fill="#EBEBEB"/>
  <text x="218" y="428" font-family="sans-serif" font-size="10" fill="#222">Leather Tote</text>
  <text x="218" y="443" font-family="sans-serif" font-size="10" fill="#888">$329</text>

  <rect x="395" y="325" width="170" height="130" rx="6" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="395" y="325" width="170" height="85" rx="6" fill="#EBEBEB"/>
  <text x="403" y="428" font-family="sans-serif" font-size="10" fill="#222">Cashmere Scarf</text>
  <text x="403" y="443" font-family="sans-serif" font-size="10" fill="#888">$79</text>

  <rect x="580" y="325" width="170" height="130" rx="6" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="580" y="325" width="170" height="85" rx="6" fill="#EBEBEB"/>
  <text x="588" y="428" font-family="sans-serif" font-size="10" fill="#222">Wool Coat</text>
  <text x="588" y="443" font-family="sans-serif" font-size="10" fill="#888">$289</text>
</svg>