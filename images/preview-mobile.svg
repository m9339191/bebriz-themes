<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 700" width="400" height="700">
  <defs>
    <linearGradient id="mobHeroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#222;stop-opacity:0.75"/>
      <stop offset="100%" style="stop-color:#222;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="phoneShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Phone Frame -->
  <rect x="60" y="20" width="280" height="660" rx="32" fill="#1A1A1A" filter="url(#phoneShadow)"/>

  <!-- Screen -->
  <rect x="68" y="36" width="264" height="628" rx="24" fill="#FFFFFF"/>

  <!-- Status Bar -->
  <rect x="68" y="36" width="264" height="28" rx="24" fill="#FAFAFA"/>
  <text x="88" y="55" font-family="sans-serif" font-size="10" font-weight="600" fill="#222">9:41</text>
  <text x="290" y="55" font-family="sans-serif" font-size="10" fill="#222">100%</text>

  <!-- Notch -->
  <rect x="160" y="36" width="80" height="16" rx="8" fill="#1A1A1A"/>

  <!-- Mobile Nav -->
  <rect x="68" y="64" width="264" height="44" fill="#FFFFFF"/>
  <line x1="68" y1="108" x2="332" y2="108" stroke="#F0F0F0" stroke-width="1"/>
  <!-- Hamburger -->
  <rect x="84" y="78" width="18" height="2" rx="1" fill="#222"/>
  <rect x="84" y="84" width="14" height="2" rx="1" fill="#222"/>
  <rect x="84" y="90" width="18" height="2" rx="1" fill="#222"/>
  <!-- Logo centered -->
  <text x="200" y="91" font-family="sans-serif" font-size="13" font-weight="700" fill="#222" text-anchor="middle">LUXE FASHION</text>
  <!-- Cart icon -->
  <rect x="302" y="78" width="14" height="12" rx="2" fill="none" stroke="#222" stroke-width="1.5"/>
  <circle cx="306" cy="76" r="0" fill="none"/>

  <!-- Hero Banner -->
  <rect x="68" y="108" width="264" height="180" fill="#E8E8E8"/>
  <rect x="68" y="108" width="264" height="180" fill="url(#mobHeroGrad)"/>
  <text x="88" y="210" font-family="sans-serif" font-size="8" font-weight="500" fill="rgba(255,255,255,0.6)" letter-spacing="2">NEW ARRIVALS</text>
  <text x="88" y="235" font-family="sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">Summer</text>
  <text x="88" y="258" font-family="sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">Collection</text>
  <rect x="88" y="268" width="80" height="24" rx="4" fill="#FFFFFF"/>
  <text x="103" y="284" font-family="sans-serif" font-size="9" font-weight="600" fill="#222">Shop Now</text>

  <!-- Section Label -->
  <text x="200" y="315" font-family="sans-serif" font-size="14" font-weight="700" fill="#222" text-anchor="middle">Trending Now</text>

  <!-- 2-column Product Grid -->
  <!-- Row 1 -->
  <rect x="78" y="330" width="118" height="145" rx="6" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="78" y="330" width="118" height="95" rx="6" fill="#EBEBEB"/>
  <text x="86" y="443" font-family="sans-serif" font-size="10" fill="#222">Classic Blazer</text>
  <text x="86" y="458" font-family="sans-serif" font-size="10" fill="#888">$149</text>

  <rect x="204" y="330" width="118" height="145" rx="6" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="204" y="330" width="118" height="95" rx="6" fill="#EBEBEB"/>
  <text x="212" y="443" font-family="sans-serif" font-size="10" fill="#222">Silk Dress</text>
  <text x="212" y="458" font-family="sans-serif" font-size="10" fill="#888">$219</text>

  <!-- Row 2 -->
  <rect x="78" y="490" width="118" height="145" rx="6" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="78" y="490" width="118" height="95" rx="6" fill="#EBEBEB"/>
  <text x="86" y="603" font-family="sans-serif" font-size="10" fill="#222">Oxford Shirt</text>
  <text x="86" y="618" font-family="sans-serif" font-size="10" fill="#888">$89</text>

  <rect x="204" y="490" width="118" height="145" rx="6" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="204" y="490" width="118" height="95" rx="6" fill="#EBEBEB"/>
  <text x="212" y="603" font-family="sans-serif" font-size="10" fill="#222">Leather Bag</text>
  <text x="212" y="618" font-family="sans-serif" font-size="10" fill="#888">$329</text>

  <!-- Home Indicator -->
  <rect x="160" y="648" width="80" height="4" rx="2" fill="#1A1A1A"/>
</svg>