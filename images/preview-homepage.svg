<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="hpHeroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#222;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#222;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="hpShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Browser Frame -->
  <rect x="16" y="16" width="768" height="468" rx="8" fill="#fff" filter="url(#hpShadow)"/>

  <!-- Browser Chrome -->
  <rect x="16" y="16" width="768" height="36" rx="8" fill="#2D2D2D"/>
  <rect x="16" y="40" width="768" height="12" fill="#2D2D2D"/>
  <circle cx="40" cy="34" r="5" fill="#FF5F56"/>
  <circle cx="56" cy="34" r="5" fill="#FFBD2E"/>
  <circle cx="72" cy="34" r="5" fill="#27C93F"/>
  <rect x="180" y="25" width="400" height="18" rx="4" fill="#1A1A1A"/>
  <text x="280" y="38" font-family="sans-serif" font-size="10" fill="#999">luxe-fashion.myshopify.com</text>

  <!-- Page Content -->
  <rect x="16" y="52" width="768" height="432" fill="#FFFFFF"/>

  <!-- Nav -->
  <rect x="16" y="52" width="768" height="40" fill="#FFFFFF"/>
  <line x1="16" y1="92" x2="784" y2="92" stroke="#E5E5E5" stroke-width="1"/>
  <text x="50" y="77" font-family="sans-serif" font-size="14" font-weight="700" fill="#222">LUXE FASHION</text>
  <text x="350" y="77" font-family="sans-serif" font-size="11" fill="#555">Home</text>
  <text x="400" y="77" font-family="sans-serif" font-size="11" fill="#555">Shop</text>
  <text x="445" y="77" font-family="sans-serif" font-size="11" fill="#555">About</text>
  <text x="495" y="77" font-family="sans-serif" font-size="11" fill="#555">Contact</text>

  <!-- Hero Slider -->
  <rect x="16" y="92" width="768" height="200" fill="#EAEAEA"/>
  <rect x="16" y="92" width="768" height="200" fill="url(#hpHeroGrad)"/>
  <text x="60" y="170" font-family="sans-serif" font-size="10" font-weight="500" fill="rgba(255,255,255,0.6)" letter-spacing="2">NEW ARRIVALS</text>
  <text x="60" y="200" font-family="sans-serif" font-size="28" font-weight="700" fill="#FFFFFF">Summer Collection</text>
  <text x="60" y="222" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.75)">Explore the season's must-have styles</text>
  <rect x="60" y="235" width="100" height="30" rx="4" fill="#FFFFFF"/>
  <text x="78" y="254" font-family="sans-serif" font-size="11" font-weight="600" fill="#222">Shop Now</text>

  <!-- Slider dots -->
  <circle cx="380" cy="280" r="4" fill="#222"/>
  <circle cx="396" cy="280" r="4" fill="#CCC"/>
  <circle cx="412" cy="280" r="4" fill="#CCC"/>

  <!-- Section Title -->
  <text x="330" y="318" font-family="sans-serif" font-size="16" font-weight="600" fill="#222">Featured Products</text>

  <!-- Product Cards -->
  <rect x="50" y="335" width="160" height="130" rx="6" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="50" y="335" width="160" height="85" rx="6" fill="#EBEBEB"/>
  <text x="58" y="438" font-family="sans-serif" font-size="10" fill="#222">Classic Blazer</text>
  <text x="58" y="453" font-family="sans-serif" font-size="10" fill="#888">$149</text>

  <rect x="230" y="335" width="160" height="130" rx="6" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="230" y="335" width="160" height="85" rx="6" fill="#EBEBEB"/>
  <text x="238" y="438" font-family="sans-serif" font-size="10" fill="#222">Silk Midi Dress</text>
  <text x="238" y="453" font-family="sans-serif" font-size="10" fill="#888">$219</text>

  <rect x="410" y="335" width="160" height="130" rx="6" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="410" y="335" width="160" height="85" rx="6" fill="#EBEBEB"/>
  <text x="418" y="438" font-family="sans-serif" font-size="10" fill="#222">Oxford Shirt</text>
  <text x="418" y="453" font-family="sans-serif" font-size="10" fill="#888">$89</text>

  <rect x="590" y="335" width="160" height="130" rx="6" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="590" y="335" width="160" height="85" rx="6" fill="#EBEBEB"/>
  <text x="598" y="438" font-family="sans-serif" font-size="10" fill="#222">Leather Tote</text>
  <text x="598" y="453" font-family="sans-serif" font-size="10" fill="#888">$329</text>
