<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Re-download Your Theme &mdash; beBriz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0A0A0B;color:#F5F5F7;font-family:'Inter',sans-serif;padding:20px}
    .card{max-width:440px;width:100%;text-align:center}
    .logo{font-size:1.5rem;font-weight:700;margin-bottom:48px;color:#fff}
    .logo span{color:#6366F1}
    h1{font-size:1.75rem;font-weight:700;margin-bottom:12px}
    .desc{color:#8E8E93;font-size:0.9375rem;line-height:1.6;margin-bottom:36px}
    .field{margin-bottom:20px;text-align:left}
    .field label{display:block;font-size:0.75rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:#8E8E93;margin-bottom:8px}
    .field input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-size:0.9375rem;font-family:inherit;outline:none;transition:border-color 0.2s}
    .field input:focus{border-color:#6366F1}
    .btn{display:inline-flex;align-items:center;justify-content:center;width:100%;padding:14px;background:#6366F1;color:#fff;border:none;border-radius:10px;font-size:0.9375rem;font-weight:600;cursor:pointer;transition:background 0.2s}
    .btn:hover{background:#5558E6}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .msg{margin-top:24px;padding:16px;border-radius:10px;font-size:0.875rem;line-height:1.5}
    .msg--success{background:rgba(34,197,94,0.1);color:#22C55E;border:1px solid rgba(34,197,94,0.2)}
    .msg--error{background:rgba(239,68,68,0.1);color:#EF4444;border:1px solid rgba(239,68,68,0.2)}
    .msg--loading{background:rgba(99,102,241,0.1);color:#6366F1;border:1px solid rgba(99,102,241,0.2)}
    .hidden{display:none}
    .footer{margin-top:48px;color:#8E8E93;font-size:0.8125rem}
    .footer a{color:#6366F1;text-decoration:none}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span>be</span>Briz</div>
    <h1>Re-download Your Theme</h1>
    <p class="desc">Enter the email you used at checkout. We'll send a one-time download link to your inbox.</p>

    <form id="redownloadForm">
      <div class="field">
        <label for="email">Purchase Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="btn" id="submitBtn">Send Download Link</button>
    </form>

    <div id="msgBox" class="hidden"></div>

    <div class="footer">
      <a href="https://theme.bebriz.com">Back to beBriz</a> &middot;
      <a href="https://theme.bebriz.com/support/">Support</a>
    </div>
  </div>

  <script>
    var API_BASE = 'https://vercel-api-kappa-olive.vercel.app';
    var form = document.getElementById('redownloadForm');
    var btn = document.getElementById('submitBtn');
    var msgBox = document.getElementById('msgBox');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      var email = document.getElementById('email').value.trim();
      if (!email) return;

      btn.disabled = true;
      btn.textContent = 'Checking...';
      msgBox.className = 'msg msg--loading';
      msgBox.textContent = 'Looking up your purchase...';

      fetch(API_BASE + '/api/redownload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success) {
          msgBox.className = 'msg msg--success';
          msgBox.textContent = data.message + ' Check your inbox (and spam folder).';
        } else {
          msgBox.className = 'msg msg--error';
          msgBox.textContent = data.error || 'No purchases found for this email.';
        }
      })
      .catch(function() {
        msgBox.className = 'msg msg--error';
        msgBox.textContent = 'Network error. Please try again.';
      })
      .finally(function() {
        btn.disabled = false;
        btn.textContent = 'Send Download Link';
      });
    });
  </script>
</body>
</html>
